name: Backend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12.5

      - name: Install dependencies
        run: make setup

      - name: Run tests
        run: make test
